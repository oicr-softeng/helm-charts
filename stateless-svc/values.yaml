affinity: {}

# container control
# k8s syntax
args: ""
command: ""
# docker syntax support (will be ignored if k8s values present)
cmd: "" # turns into "args"
entrypoint: "" # turns into "command" (and args if needed)

container:
  port: 3000

createSecrets: {}

customLabels: {}

extraEnv: {} # PROCESS_VAR: abc

extraEnvYaml: []
# - name: ELASTIC_USER
#   valueFrom:
#     secretKeyRef:
#       name: secret-name
#       key: secret-key

# full name = fullnameOverride || (name + Release Name)
fullnameOverride: ""

image:
  repository: ghcr.io/oicr-softeng/your-service
  tag: 0.1.0
  pullPolicy: IfNotPresent

imagePullSecrets: []


mountEmptyDirs: []
  # - name: <resource>-emptydir # <- automatic suffix
  #   path: <target directory>
  #   preserveOriginal: <boolean> (optional, keep the existing files in path - no "shadow")
  #   copyFromAltPath: <alternate source directory> (optional, replace the files in the target path)

mountSecrets: []
  # - name: <secret name>
  #   path: <mount path>
  #   defaultMode: 0644

nameOverride: ""

network:
  # Configure at most one routing block. Both being set causes a deployment error.
  #
  # ingress:
  #   annotations: {}
  #   className: ""
  #   hosts: []
  #   # - host: myapp.example.com
  #   #   paths:
  #   #   - path: /
  #   #     pathType: ImplementationSpecific
  #   tls: []
  #   # - hosts:
  #   #   - myapp.example.com
  #   #   secretName: myapp-tls
  #
  # gateway:
  #   hosts: []
  #   # - myapp.example.com
  #   name: ""         # defaults to <release-name>-gateway in the template
  #   namespace: ""    # defaults to same namespace as this release
  #   rules:
  #   - matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #     filters: []
  #   sectionName: ""  # optional: targets a specific listener on the Gateway

  inbound:
    allowSameNamespace: false  # allow all pods in the same namespace to reach this service
    cidrs: []
    # - cidr: 10.0.0.0/24        # port omitted: allow all ports from this CIDR
    # - cidr: 10.0.0.0/24
    #   port: 8080                # restrict to this port only
    fromRouter:
      # NP rule allowing the routing infrastructure (ingress controller or gateway
      # data plane) to reach this service. Required on default-deny clusters when
      # network.ingress or network.gateway is configured; has no effect when both fields are empty.
      namespace: ""
      podLabels: {}
      # app.kubernetes.io/name: traefik
    pods: []
    # - namespace: kube-backup    # labels omitted: allow any pod in this namespace
    # - namespace: monitoring
    #   labels:                   # with labels: allow only matching pods
    #     app.kubernetes.io/name: prometheus
    # - namespace: monitoring
    #   labels:
    #     app.kubernetes.io/name: prometheus
    #   port: 8080                # with port: restrict to this port only
    #   protocol: TCP

  outbound:
    allowDns: false           # allow outbound DNS resolution (UDP/TCP 53) to any destination; required on default-deny clusters
    allowSameNamespace: false  # allow this service to reach all pods in the same namespace
    cidrs: []
    # - cidr: 0.0.0.0/0          # port omitted: allow all ports to this CIDR
    #   except:
    #   - 10.0.0.0/8
    #   - 192.168.0.0/16
    # - cidr: 0.0.0.0/0
    #   port: 443                 # restrict to this port only
    #   except:
    #   - 10.0.0.0/8
    #   - 192.168.0.0/16
    # - cidr: 192.168.0.0/24
    #   port: 6443
    pods: []
    # - namespace: postgres       # labels omitted: allow to any pod in this namespace
    # - namespace: postgres
    #   labels:                   # with labels: allow only matching pods
    #     app.kubernetes.io/name: postgres
    # - namespace: postgres
    #   labels:
    #     app.kubernetes.io/name: postgres
    #   port: 5432                # with port: restrict to this port only
    #   protocol: TCP

nodeSelector: {}

podAnnotations: {}

podSecurityContext:
  runAsGroup: 9999
  runAsNonRoot: true
  runAsUser: 9999

probes:
  liveness:
    path: /
    initialDelaySeconds: 30
    timeoutSeconds: 2
    periodSeconds: 8
    failureThreshold: 1
  readiness:
    path: /
    initialDelaySeconds: 60
    timeoutSeconds: 2
    periodSeconds: 3
    failureThreshold: 2

# choose rbac roles to enable
rbac:
  create:
    # for vault kubernetes integration
    tokenReview: false

replicaCount: 1

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  # port: 80  # defaults to container.port; set explicitly only when service and container ports must differ

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  # name:

sidecars: []

tolerations: []
