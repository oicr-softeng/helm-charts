{{- $hasIngress := or .Values.ingress.allowSameNamespace .Values.ingress.pods .Values.ingress.cidrs -}}
{{- $hasEgress := or .Values.egress.allowSameNamespace .Values.egress.pods .Values.egress.cidrs -}}
{{- if or $hasIngress $hasEgress -}}
{{ $namespace := .Release.Namespace }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ include "stateless-svc.fullname" . }}
  labels:
    {{- include "stateless-svc.labels" . | nindent 4 }}
    {{- include "stateless-svc.customLabels" . | nindent 4 }}
  namespace: {{ $namespace }}

spec:
  # Targets only the pods belonging to this release.
  podSelector:
    matchLabels:
      {{- include "stateless-svc.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    {{- if $hasEgress }}
    # Egress is only restricted when explicit egress rules are configured.
    # Without any egress configuration, all outbound traffic is unrestricted.
    - Egress
    {{- end }}

  ingress:
    {{- if .Values.ingress.allowSameNamespace }}
    # Allow all pods within the same namespace to reach this service.
    - from:
        - podSelector: {}
    {{- end }}

    {{- range $rule := index .Values "ingress" "cidrs" }}
    - from:
        - ipBlock:
            cidr: {{ index $rule.host }}
      ports:
        - port: {{ index $rule.port }}
    {{- end }}

    {{- range $rule := index .Values "ingress" "pods" }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ index $rule.namespace }}
          podSelector:
            matchLabels:
              {{- range $k, $v := $rule.labels }}
              {{- range $kk, $vv := $v }}
              {{ $kk }}: {{ $vv }}
              {{- end }}
              {{- end }}
      ports:
        - port: {{ index $rule.port }}
          protocol: {{ index $rule.protocol }}
    {{- end }}

  {{- if $hasEgress }}
  egress:
    {{- if .Values.egress.allowSameNamespace }}
    # Allow this service to reach all pods within the same namespace.
    - to:
        - podSelector: {}
    {{- end }}

    {{- range $rule := index .Values "egress" "pods" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ index $rule.namespace }}
          podSelector:
            matchLabels:
              {{- range $k, $v := $rule.labels }}
              {{- range $kk, $vv := $v }}
              {{ $kk }}: {{ $vv }}
              {{- end }}
              {{- end }}
      ports:
        - port: {{ index $rule.port }}
          protocol: {{ index $rule.protocol }}
    {{- end }}

    {{- range $rule := index .Values "egress" "cidrs" }}
    - to:
        - ipBlock:
            cidr: {{ index $rule.host }}
      ports:
        - port: {{ index $rule.port }}
    {{- end }}
  {{- end }}
{{- end }}
