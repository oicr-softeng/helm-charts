{{- $inbound := .Values.network.inbound -}}
{{- $outbound := .Values.network.outbound -}}
{{- $hasInbound := or $inbound.allowSameNamespace $inbound.pods $inbound.cidrs $inbound.fromRouter.namespace -}}
{{- $hasOutbound := or $outbound.allowSameNamespace $outbound.pods $outbound.cidrs $outbound.allowDns -}}
{{- if or $hasInbound $hasOutbound -}}
{{ $namespace := .Release.Namespace }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ include "stateless-svc.fullname" . }}
  labels:
    {{- include "stateless-svc.labels" . | nindent 4 }}
    {{- include "stateless-svc.customLabels" . | nindent 4 }}
  namespace: {{ $namespace }}

spec:
  # Targets only the pods belonging to this release.
  podSelector:
    matchLabels:
      {{- include "stateless-svc.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    {{- if $hasOutbound }}
    # Egress is only restricted when explicit outbound rules are configured.
    # Without any outbound configuration, all egress traffic is unrestricted.
    - Egress
    {{- end }}

  ingress:
    {{- if $inbound.allowSameNamespace }}
    # Allow all pods within the same namespace to reach this service.
    - from:
        - podSelector: {}
    {{- end }}

    {{- if $inbound.fromRouter.namespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $inbound.fromRouter.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $inbound.fromRouter.podLabels | nindent 14 }}
    {{- end }}

    {{- range $rule := $inbound.cidrs }}
    - from:
        - ipBlock:
            cidr: {{ $rule.cidr }}
      {{- if $rule.port }}
      ports:
        - port: {{ $rule.port }}
      {{- end }}
    {{- end }}

    {{- range $rule := $inbound.pods }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $rule.namespace }}
          {{- if $rule.labels }}
          podSelector:
            matchLabels:
              {{- toYaml $rule.labels | nindent 14 }}
          {{- end }}
      {{- if $rule.port }}
      ports:
        - port: {{ $rule.port }}
          {{- if $rule.protocol }}
          protocol: {{ $rule.protocol }}
          {{- end }}
      {{- end }}
    {{- end }}

  {{- if $hasOutbound }}
  egress:
    {{- if $outbound.allowSameNamespace }}
    # Allow this service to reach all pods within the same namespace.
    - to:
        - podSelector: {}
    {{- end }}

    {{- if $outbound.allowDns }}
    # Allow DNS resolution to any destination.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}

    {{- range $rule := $outbound.pods }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $rule.namespace }}
          {{- if $rule.labels }}
          podSelector:
            matchLabels:
              {{- toYaml $rule.labels | nindent 14 }}
          {{- end }}
      {{- if $rule.port }}
      ports:
        - port: {{ $rule.port }}
          {{- if $rule.protocol }}
          protocol: {{ $rule.protocol }}
          {{- end }}
      {{- end }}
    {{- end }}

    {{- range $rule := $outbound.cidrs }}
    - to:
        - ipBlock:
            cidr: {{ $rule.cidr }}
            {{- if $rule.except }}
            except:
              {{- range $rule.except }}
              - {{ . }}
              {{- end }}
            {{- end }}
      {{- if $rule.port }}
      ports:
        - port: {{ $rule.port }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
