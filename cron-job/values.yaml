# Forbid prevents overlapping runs if a job takes longer than its interval.
# Set to Allow or Replace if overlap is acceptable for your workload.
concurrencyPolicy: Forbid

customLabels: {}

execute:
  enable: false
  spec:
    args:
    - infinity
    command:
    - sleep

extraEnv: {} # PROCESS_VAR: abc
extraEnvYaml: []
# - name: ELASTIC_USER
#   valueFrom:
#     secretKeyRef:
#       name: secret-name
#       key: secret-key

failedJobsHistoryLimit: 1

# imagePullSecrets:
#   - name: my-registry-secret

image:
  pullPolicy: IfNotPresent
  # repository: ghcr.io/some-org/some-img
  # tag: 1.0.0

persistence:
  volume:
    attach: false
    name: "volume_name"
    path: "mount_path"

restartPolicy: Never

# The extra quotes are required — without them YAML parses the asterisks as anchors.
schedule: '"0 0 * * *"'

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  # name:

successfulJobsHistoryLimit: 3
