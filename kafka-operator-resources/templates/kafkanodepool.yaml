{{ if (eq .Values.kafkaMode "kraft") }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-node
  labels:
    strimzi.io/cluster: {{ include "kafka-operator-resources.fullname" . }}
spec:
  replicas: {{ .Values.KafkaNodePool.replicas }}
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.KafkaNodePool.storage.size }}
        deleteClaim: {{ .Values.KafkaNodePool.storage.deleteClaim }}
        kraftMetadata: shared
  template:
    kafkaContainer:
      securityContext:
        {{- with .Values.KafkaNodePool.template.kafkaContainer.securityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    pod:
      securityContext:
        {{- with .Values.KafkaNodePool.template.pod.securityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}

